on:
  workflow_dispatch:
    inputs:
      log-level:
        description: "Override default log level"
        required: false
        default: "debug"
        type: string

  schedule:
    - cron: "0 4 * * *"

jobs:
  renovate:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      issues: write
    uses: coopnorge/github-workflow-renovate/.github/workflows/renovate.yaml@v0
    secrets: inherit
    with:
      log-level: ${{ inputs.log-level }}
      gcp-workload-identity-provider: projects/27056482351/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider
      gcp-service-account: gh-action-pipeline@store-informat-shared-5fc8.iam.gserviceaccount.com
